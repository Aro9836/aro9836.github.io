name: Aranya Dutta
author: Aranya Dutta
title: "Aranya Dutta"
description: "Backend Engineer building production-ready APIs, authentication systems, and containerized services. Focused on FastAPI, PostgreSQL, and Docker."
keywords: "backend engineer, FastAPI, PostgreSQL, Docker, Python, C++, open source, competitive programming, Aranya Dutta"
tagline: "Learning, One Step at a Time"
logo: /images/me.jpg

social:
  github: https://github.com/thisizaro
  instagram: https://instagram.com/thisizaro
  linkedin: https://www.linkedin.com/in/thisisaro
  email: mailto:thisisaro.official@gmail.com

url: https://thisizaro.github.io
baseurl: ""

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 10
paginate_path: "blog/page:num"
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Aranya Dutta"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - node_modules
