---
layout: base
---
<div class="container">
  <article class="post" itemscope itemtype="https://schema.org/BlogPosting">
    <header class="post-header">
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
          {{ page.date | date: "%B %-d, %Y" }}
        </time>
        {% if page.tags %}
        <span class="post-tags">
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </span>
        {% endif %}
      </div>
      <h1 class="post-title" itemprop="headline">{{ page.title }}</h1>
      {% if page.excerpt and page.excerpt != "" %}
      <p class="post-excerpt" itemprop="description">{{ page.excerpt | strip_html }}</p>
      {% endif %}
    </header>
    <div class="post-body" itemprop="articleBody">
      {{ content }}
    </div>
    <footer class="post-footer">
      <a href="{{ site.baseurl }}/blog" class="back-link">&larr; Back to all posts</a>
    </footer>
  </article>
</div>
