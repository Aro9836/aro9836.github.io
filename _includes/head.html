<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.name }} — {{ site.tagline }}{% endif %}</title>

  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html','' }}" />

  <!-- SEO meta -->
  <meta name="author" content="{{ site.author }}" />
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}, {% endif %}{{ site.keywords }}" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.name }}{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:image" content="{{ site.url }}{{ site.logo }}" />
  <meta property="og:site_name" content="{{ site.name }}" />
  {% if page.layout == 'post' %}
  <meta property="article:author" content="{{ site.author }}" />
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  {% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:site" content="@thisizaro" />
  <meta name="twitter:creator" content="@thisizaro" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.name }}{% endif %}" />
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="twitter:image" content="{{ site.url }}{{ site.logo }}" />

  <!-- Structured Data: Person (home/about pages) -->
  {% unless page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Aranya Dutta",
    "url": "{{ site.url }}",
    "image": "{{ site.url }}{{ site.logo }}",
    "description": "{{ site.description }}",
    "jobTitle": "Backend Engineer",
    "email": "thisisaro.official@gmail.com",
    "sameAs": [
      "https://github.com/thisizaro",
      "https://www.linkedin.com/in/thisisaro",
      "https://instagram.com/thisizaro"
    ]
  }
  </script>
  {% endunless %}

  <!-- Structured Data: BlogPosting -->
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "Aranya Dutta",
      "url": "{{ site.url }}"
    },
    "publisher": {
      "@type": "Person",
      "name": "Aranya Dutta",
      "url": "{{ site.url }}"
    },
    "description": "{% if page.excerpt %}{{ page.excerpt | strip_html | escape | truncatewords: 30 }}{% else %}{{ site.description }}{% endif %}",
    "url": "{{ site.url }}{{ page.url }}"
  }
  </script>
  {% endif %}

  <!-- Icons -->
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico" />
  <link rel="apple-touch-icon" href="{{ site.baseurl }}{{ site.logo }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />

  <!-- RSS Feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />

  <!-- Google Analytics -->
  {% if jekyll.environment == "production" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RYD6ZEVTKE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RYD6ZEVTKE');
  </script>
  {% endif %}
</head>
